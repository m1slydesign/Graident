<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gradients — by M1SLY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1c1c1c;--tx:#f0f0f0;--tx2:#888;--tx3:#444;--br:rgba(255,255,255,.07);--br2:rgba(255,255,255,.12)}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;opacity:.018;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* NAV */
nav{position:sticky;top:0;z-index:100;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,8,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--br)}
.logo{font-weight:900;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;color:var(--tx)}
.logo sup{font-size:.5rem;color:#00ff88;letter-spacing:0;vertical-align:super}
.nav-sub{font-size:.7rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}

/* HERO */
.hero{text-align:center;padding:60px 40px 40px;position:relative;z-index:1}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:10px}
.hero h1 span{background:linear-gradient(135deg,#00ff88,#00d4ff,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:.88rem;color:var(--tx2);font-weight:300;letter-spacing:.5px}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 40px 28px;position:relative;z-index:1}
.cat-btn{padding:7px 16px;background:transparent;border:1px solid var(--br2);border-radius:3px;color:var(--tx3);font-family:'Inter',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.cat-btn:hover{border-color:rgba(255,255,255,.25);color:var(--tx2)}
.cat-btn.act{background:#fff;color:#000;border-color:#fff}
.sep{width:1px;height:24px;background:var(--br);margin:0 4px}
.gen-btn{padding:7px 18px;background:linear-gradient(135deg,#00ff88,#00d4ff);color:#000;border:none;border-radius:3px;font-family:'Inter',sans-serif;font-size:.7rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.gen-btn:hover{opacity:.85;transform:translateY(-1px)}

/* TYPE TOGGLE */
.type-row{display:flex;justify-content:center;gap:6px;padding:0 40px 32px;flex-wrap:wrap;position:relative;z-index:1}
.type-btn{padding:5px 14px;background:transparent;border:1px solid var(--br);border-radius:2px;color:var(--tx3);font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.type-btn:hover{border-color:rgba(255,255,255,.2);color:var(--tx2)}
.type-btn.act{border-color:#00ff88;color:#00ff88}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--br);border:1px solid var(--br);margin:0 40px 60px;position:relative;z-index:1}
.card{background:var(--bg);cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.card:hover{background:var(--bg2);z-index:2;transform:scale(1.01)}
.card:hover .card-overlay{opacity:1}
.card-preview{height:130px;position:relative}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;gap:8px}
.copy-btn-small{padding:5px 12px;background:rgba(255,255,255,.9);color:#000;border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.copy-btn-small:hover{background:#fff}
.card-info{padding:12px 14px;border-top:1px solid var(--br)}
.card-type{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.card-colors{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.color-swatch{display:flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
.color-swatch:hover .swatch-dot{transform:scale(1.3)}
.swatch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:transform .15s}
.swatch-hex{font-size:.62rem;font-weight:600;color:var(--tx3);letter-spacing:.5px;font-family:'Inter',sans-serif}
.color-swatch:hover .swatch-hex{color:var(--tx2)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#000;padding:10px 22px;border-radius:3px;font-size:.75rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STROKE/FILL SECTION */
.sf-section{margin:0 40px 60px;position:relative;z-index:1}
.sf-title{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#00ff88;margin-bottom:16px}
.sf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--br);border:1px solid var(--br)}
.sf-card{background:var(--bg);padding:20px;cursor:pointer;transition:all .25s;position:relative}
.sf-card:hover{background:var(--bg2)}
.sf-card:hover .sf-overlay{opacity:1}
.sf-overlay{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .2s}
.sf-preview{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.sf-stroke-box{width:60px;height:60px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sf-fill-box{width:60px;height:60px;border-radius:4px;flex-shrink:0}
.sf-label{font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:3px}
.sf-colors{display:flex;gap:5px;flex-wrap:wrap}
.sf-copy-row{display:flex;gap:6px;margin-top:10px}
.sf-copy-btn{flex:1;padding:6px 8px;background:transparent;border:1px solid var(--br2);color:var(--tx3);font-family:'Inter',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.sf-copy-btn:hover{border-color:#00ff88;color:#00ff88}

/* GENERATE RANDOM */
.gen-section{margin:0 40px 60px;position:relative;z-index:1}
.gen-box{background:var(--bg2);border:1px solid var(--br);padding:28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.gen-preview{display:flex;gap:10px;flex:1;min-width:200px}
.gen-grad-box{flex:1;height:70px;border-radius:3px;transition:all .4s}
.gen-info{flex:1;min-width:180px}
.gen-info-label{font-size:.6rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.gen-hex-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.gen-hex{font-size:.72rem;font-weight:700;color:var(--tx2);font-family:'Inter',sans-serif;cursor:pointer;padding:3px 8px;border:1px solid var(--br);border-radius:2px;transition:all .2s}
.gen-hex:hover{border-color:#00ff88;color:#00ff88}
.gen-btns{display:flex;gap:6px;flex-wrap:wrap}

/* FOOTER */
footer{text-align:center;padding:24px;border-top:1px solid var(--br);position:relative;z-index:1}
footer p{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}
footer span{color:#00ff88}

@media(max-width:600px){
  nav{padding:12px 20px}
  .hero{padding:40px 20px 28px}
  .controls,.type-row{padding:0 20px 20px}
  .grid,.sf-section,.gen-section{margin:0 0 40px}
  .sf-section,.gen-section{margin:0 20px 40px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Gradients<sup>®</sup></div>
  <div class="nav-sub">by M1SLY</div>
</nav>

<div class="hero">
  <h1>Pick a <span>Gradient.</span></h1>
  <p>Click any color to copy hex — click card to copy full CSS gradient</p>
</div>

<div class="controls" id="cats"></div>
<div class="type-row" id="types"></div>

<!-- RANDOM GENERATOR -->
<div class="gen-section">
  <div class="sf-title">⚡ Random Generator — Stroke + Fill</div>
  <div class="gen-box">
    <div class="gen-preview">
      <div style="display:flex;flex-direction:column;gap:6px;flex:1">
        <div style="font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3)">FILL</div>
        <div class="gen-grad-box" id="genFill"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex:1">
        <div style="font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3)">STROKE</div>
        <div class="gen-grad-box" id="genStroke"></div>
      </div>
    </div>
    <div class="gen-info">
      <div class="gen-info-label">Fill Colors</div>
      <div class="gen-hex-row" id="genFillHex"></div>
      <div class="gen-info-label" style="margin-top:8px">Stroke Colors</div>
      <div class="gen-hex-row" id="genStrokeHex"></div>
      <div class="gen-btns" style="margin-top:14px">
        <button class="gen-btn" onclick="generateRandom()">⚡ Generate</button>
        <button class="copy-btn-small" style="padding:7px 14px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--tx2)" onclick="copyGenFill()">Copy Fill CSS</button>
        <button class="copy-btn-small" style="padding:7px 14px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--tx2)" onclick="copyGenStroke()">Copy Stroke CSS</button>
      </div>
    </div>
  </div>
</div>

<!-- STROKE + FILL PAIRS -->
<div class="sf-section">
  <div class="sf-title">🎨 Stroke + Fill Pairs</div>
  <div class="sf-grid" id="sfGrid"></div>
</div>

<!-- MAIN GRADIENT GRID -->
<div class="grid" id="grid"></div>

<div class="toast" id="toast"></div>

<footer><p>Gradients — <span>by M1SLY®</span></p></footer>

  {name:'Neon Circuit',fill:['#000a0a','#001a0a','#003322'],stroke:['#00ff88','#00ffcc'],category:'neon'},

// ══════════ BUILD GRADIENT CSS ══════════

function buildCSS(g) {
  const c = g.colors.join(', ');
  if (g.type === 'radial') return `radial-gradient(circle, ${c})`;
  if (g.type === 'conic') return `conic-gradient(${c})`;
  const a = g.angle || 135;
  return `linear-gradient(${a}deg, ${c})`;
}

function buildLinear(colors, angle=135) {
  return `linear-gradient(${angle}deg, ${colors.join(', ')})`;
}

// ══════════ CATEGORIES ══════════

function buildCats() {
  const el = document.getElementById('cats');
  CATEGORIES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c.id === activeCat ? ' act' : '');
    b.textContent = c.label;
    b.onclick = () => {
      activeCat = c.id;
      document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('act'));
      b.classList.add('act');
      renderGrid();
    };
    el.appendChild(b);
  });

  el.appendChild(Object.assign(document.createElement('div'), {className:'sep'}));

  const gb = document.createElement('button');
  gb.className = 'gen-btn';
  gb.textContent = '⚡ Random';
  gb.onclick = generateRandom;
  el.appendChild(gb);
}

function buildTypes() {
  const el = document.getElementById('types');
  TYPES.forEach(t => {
    const b = document.createElement('button');
    b.className = 'type-btn' + (t === activeType ? ' act' : '');
    b.textContent = t;
    b.onclick = () => {
      activeType = t;
      document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('act'));
      b.classList.add('act');
      renderGrid();
    };
    el.appendChild(b);
  });
}

// ══════════ MAIN GRID ══════════

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let filtered = GRADIENTS;
  if (activeCat !== 'all') filtered = filtered.filter(g => g.cat === activeCat);
  if (activeType !== 'All Types') {
    const t = activeType.toLowerCase();
    if (t === 'stroke' || t === 'fill') {
      // show sf pairs instead
      renderSFGrid(t);
      grid.style.display = 'none';
      return;
    }
    filtered = filtered.filter(g => g.type === t);
  }
  grid.style.display = 'grid';

  filtered.forEach(g => {
    const css = buildCSS(g);
    const card = document.createElement('div');
    card.className = 'card';

    const preview = document.createElement('div');
    preview.className = 'card-preview';
    preview.style.background = css;

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn-small';
    copyBtn.textContent = 'Copy CSS';
    copyBtn.onclick = (e) => { e.stopPropagation(); copyText(css, 'CSS Copied!'); };

    overlay.appendChild(copyBtn);
    preview.appendChild(overlay);

    const info = document.createElement('div');
    info.className = 'card-info';

    const typeEl = document.createElement('div');
    typeEl.className = 'card-type';
    typeEl.textContent = g.type.toUpperCase() + ' · ' + g.name;
    info.appendChild(typeEl);

    const colors = document.createElement('div');
    colors.className = 'card-colors';

    g.colors.forEach(hex => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch';
      sw.title = 'Click to copy ' + hex;
      sw.onclick = (e) => { e.stopPropagation(); copyText(hex, hex + ' Copied!'); };

      const dot = document.createElement('div');
      dot.className = 'swatch-dot';
      dot.style.background = hex;
      dot.style.border = hex.toLowerCase() === '#ffffff' || hex.toLowerCase() === '#fff' ? '1px solid #333' : 'none';

      const label = document.createElement('span');
      label.className = 'swatch-hex';
      label.textContent = hex;

      sw.appendChild(dot);
      sw.appendChild(label);
      colors.appendChild(sw);
    });

    info.appendChild(colors);
    card.appendChild(preview);
    card.appendChild(info);
    card.onclick = () => copyText(css, 'Gradient CSS Copied!');
    grid.appendChild(card);
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="padding:60px;text-align:center;color:var(--tx3);font-size:.8rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:var(--bg)">No gradients found</div>';
  }
}

// ══════════ SF GRID ══════════

function renderSFGrid(type) {
  buildSFGrid();
  document.getElementById('sfGrid').scrollIntoView({behavior:'smooth'});
}

function buildSFGrid() {
  const grid = document.getElementById('sfGrid');
  grid.innerHTML = '';

  SF_PAIRS.forEach(pair => {
    const card = document.createElement('div');
    card.className = 'sf-card';

    const preview = document.createElement('div');
    preview.className = 'sf-preview';

    const fillBox = document.createElement('div');
    fillBox.className = 'sf-fill-box';
    fillBox.style.background = buildLinear(pair.fill);
    fillBox.title = 'Fill gradient';

    const strokeBox = document.createElement('div');
    strokeBox.className = 'sf-stroke-box';
    strokeBox.style.cssText = `
      background: var(--bg3);
      border: 4px solid transparent;
      background-clip: padding-box;
      border-image: ${buildLinear(pair.stroke)} 1;
    `;

    const strokeVisual = document.createElement('div');
    strokeVisual.style.cssText = `width:100%;height:100%;background:${buildLinear(pair.stroke)};border-radius:2px`;
    strokeBox.style.background = 'none';
    strokeBox.style.border = 'none';
    strokeBox.appendChild(strokeVisual);

    const labels = document.createElement('div');
    labels.innerHTML = `
      <div>
        <div class="sf-label">Fill</div>
        <div class="sf-colors">${pair.fill.map(c=>`<div class="color-swatch" onclick="copyText('${c}','${c} Copied!')"><div class="swatch-dot" style="background:${c}"></div><span class="swatch-hex">${c}</span></div>`).join('')}</div>
      </div>
      <div style="margin-top:8px">
        <div class="sf-label">Stroke</div>
        <div class="sf-colors">${pair.stroke.map(c=>`<div class="color-swatch" onclick="copyText('${c}','${c} Copied!')"><div class="swatch-dot" style="background:${c}"></div><span class="swatch-hex">${c}</span></div>`).join('')}</div>
      </div>
    `;

    preview.appendChild(fillBox);
    preview.appendChild(strokeBox);
    preview.appendChild(labels);

    const copyRow = document.createElement('div');
    copyRow.className = 'sf-copy-row';

    const fillCSS = buildLinear(pair.fill);
    const strokeCSS = buildLinear(pair.stroke);

    const copyFill = document.createElement('button');
    copyFill.className = 'sf-copy-btn';
    copyFill.textContent = 'Copy Fill';
    copyFill.onclick = (e) => { e.stopPropagation(); copyText(fillCSS, 'Fill CSS Copied!'); };

    const copyStroke = document.createElement('button');
    copyStroke.className = 'sf-copy-btn';
    copyStroke.textContent = 'Copy Stroke';
    copyStroke.onclick = (e) => { e.stopPropagation(); copyText(strokeCSS, 'Stroke CSS Copied!'); };

    copyRow.appendChild(copyFill);
    copyRow.appendChild(copyStroke);

    const title = document.createElement('div');
    title.style.cssText = 'font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px';
    title.textContent = pair.name + ' · ' + pair.category.toUpperCase();

    card.appendChild(title);
    card.appendChild(preview);
    card.appendChild(copyRow);
    grid.appendChild(card);
  });
}

// ══════════ RANDOM GENERATOR ══════════

const HARMONY_PALETTES = [
  // neon on dark
  () => { const hue=Math.random()*360; return { fill: [hsl(hue,100,2), hsl(hue,80,8), hsl(hue,60,16)], stroke: [hsl(hue,100,55), hsl((hue+30)%360,100,65)] }; },
  // pastel
  () => { const hue=Math.random()*360; return { fill: [hsl(hue,40,90), hsl((hue+60)%360,40,88)], stroke: [hsl(hue,50,60), hsl((hue+30)%360,50,55)] }; },
  // dark mono
  () => { const l=Math.floor(Math.random()*30+5); return { fill: [hsl(0,0,l), hsl(0,0,l+10), hsl(0,0,l+20)], stroke: [hsl(0,0,l+40), hsl(0,0,l+60)] }; },
  // vibrant
  () => { const hue=Math.random()*360; return { fill: [hsl(hue,90,15), hsl(hue,85,25)], stroke: [hsl(hue,100,55), hsl((hue+180)%360,100,55)] }; },
  // fire
  () => ({ fill: [hsl(0,100,3), hsl(10,100,8), hsl(20,100,12)], stroke: [hsl(25,100,55), hsl(45,100,60)] }),
  // ocean
  () => ({ fill: [hsl(220,100,3), hsl(210,100,8), hsl(200,100,14)], stroke: [hsl(195,100,55), hsl(180,100,60)] }),
  // sunset
  () => ({ fill: [hsl(280,80,8), hsl(300,60,5)], stroke: [hsl(20,100,60), hsl(40,100,65)] }),
  // roblox
  () => { const pairs=[[0,100,40,0,100,55],[220,100,40,200,80,60],[45,100,40,45,100,60]]; const p=pairs[Math.floor(Math.random()*pairs.length)]; return {fill:[hsl(p[0],p[1],p[2])],stroke:[hsl(p[3],p[4],p[5])]}; },
];

function hsl(h,s,l){ return `hsl(${Math.round(h)},${Math.round(s)}%,${Math.round(l)})` }

function hslToHex(h,s,l){
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return `#${f(0)}${f(8)}${f(4)}`;
}

function parseHSL(str){
  const m=str.match(/hsl\((\d+),(\d+)%,(\d+)%\)/);
  if(m) return hslToHex(+m[1],+m[2],+m[3]);
  return str;
}

function generateRandom(){
  const idx = Math.floor(Math.random()*HARMONY_PALETTES.length);
  const palette = HARMONY_PALETTES[idx]();
  const angle = Math.floor(Math.random()*360);

  genFillData = { colors: palette.fill, angle };
  genStrokeData = { colors: palette.stroke, angle: (angle+90)%360 };

  const fillCSS = buildLinear(palette.fill, angle);
  const strokeCSS = buildLinear(palette.stroke, (angle+90)%360);

  document.getElementById('genFill').style.background = fillCSS;
  document.getElementById('genStroke').style.background = strokeCSS;

  document.getElementById('genFillHex').innerHTML = palette.fill.map(c=>{
    const hex = parseHSL(c);
    return `<div class="gen-hex" onclick="copyText('${hex}','${hex} Copied!')" title="Click to copy">${hex}</div>`;
  }).join('');

  document.getElementById('genStrokeHex').innerHTML = palette.stroke.map(c=>{
    const hex = parseHSL(c);
    return `<div class="gen-hex" onclick="copyText('${hex}','${hex} Copied!')" title="Click to copy">${hex}</div>`;
  }).join('');
}

function copyGenFill(){
  if(!genFillData) return;
  copyText(buildLinear(genFillData.colors, genFillData.angle), 'Fill CSS Copied!');
}
function copyGenStroke(){
  if(!genStrokeData) return;
  copyText(buildLinear(genStrokeData.colors, genStrokeData.angle), 'Stroke CSS Copied!');
}

// ══════════ COPY ══════════

function copyText(text, msg){
  navigator.clipboard.writeText(text).then(()=>toast(msg)).catch(()=>{
    const t=document.createElement('textarea');
    t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    toast(msg);
  });
}

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1800);
}

// ══════════ INIT ══════════

buildCats();
buildTypes();
renderGrid();
buildSFGrid();
generateRandom();
