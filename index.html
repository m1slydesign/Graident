<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emsly Gradients — Pro Gradient Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090b;--bg2:#111113;--bg3:#18181b;--bg4:#1f1f23;--bg5:#27272a;
--border:#27272a;--border2:#3f3f46;--border3:#52525b;
--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--text4:#52525b;
--white:#fff;--r:8px;--r2:12px;--r3:16px;--r4:20px;
--tr:all .2s ease;--trs:all .35s cubic-bezier(.4,0,.2,1)
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::selection{background:rgba(255,255,255,.12)}
button{font-family:inherit}

/* ═══ HEADER ═══ */
.hdr{position:sticky;top:0;z-index:100;background:rgba(9,9,11,.88);backdrop-filter:blur(24px);
border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:default}
.logo-m{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#fff,#888);
display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;font-weight:900}
.logo h1{font-size:1rem;font-weight:800;letter-spacing:-.03em}
.logo h1 span{color:var(--text3);font-weight:500;margin-left:2px}
.hdr-actions{display:flex;gap:6px;align-items:center}
.hdr-btn{height:34px;padding:0 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:6px}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}
.hdr-btn.primary{background:var(--white);color:#000;border-color:var(--white)}
.hdr-btn.primary:hover{opacity:.9}

/* ═══ VIEWS ═══ */
.view{display:none;animation:vIn .3s ease}.view.on{display:block}
@keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ FILTER BAR ═══ */
.filters{padding:20px 24px 0;max-width:1400px;margin:0 auto}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-label{font-size:.72rem;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;
min-width:64px;flex-shrink:0}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{height:30px;padding:0 12px;background:transparent;border:1px solid var(--border);border-radius:20px;
color:var(--text3);font-size:.75rem;font-weight:600;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:5px;
white-space:nowrap}
.pill:hover{border-color:var(--border2);color:var(--text2)}
.pill.on{background:var(--white);color:#000;border-color:var(--white)}
.pill .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-meta{padding:0 24px 16px;max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.filter-count{font-size:.78rem;color:var(--text3);font-weight:500}
.filter-count b{color:var(--text2);font-weight:700}

/* ═══ GRID ═══ */
.grid-wrap{padding:0 24px 40px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{border-radius:var(--r3);overflow:hidden;cursor:pointer;transition:var(--trs);
border:1px solid var(--border);background:var(--bg2);position:relative}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.card-swatch{aspect-ratio:1;position:relative;overflow:hidden}
.card-swatch::after{content:'';position:absolute;inset:0;
background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.6) 100%)}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;z-index:2}
.card-name{font-size:.78rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.card-tags{display:flex;gap:4px;margin-top:4px}
.card-tag{font-size:.58rem;font-weight:600;padding:2px 7px;border-radius:10px;
background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);backdrop-filter:blur(8px)}
.card-actions{position:absolute;top:8px;right:8px;z-index:2;display:flex;gap:4px;opacity:0;transition:var(--tr)}
.card:hover .card-actions{opacity:1}
.card-act{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
border:none;color:#fff;cursor:pointer;font-size:.72rem;transition:var(--tr);display:flex;align-items:center;justify-content:center}
.card-act:hover{background:rgba(255,255,255,.2)}
.load-more-wrap{text-align:center;padding:32px 24px}
.load-more{height:42px;padding:0 28px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
color:var(--text2);font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.load-more:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.empty-state{text-align:center;padding:80px 24px;color:var(--text4)}
.empty-state i{font-size:2.5rem;margin-bottom:16px;display:block;opacity:.4}
.empty-state p{font-size:.9rem}

/* ═══ EDITOR ═══ */
.editor{max-width:720px;margin:0 auto;padding:0 24px 60px}
.ed-back{display:flex;align-items:center;gap:8px;padding:16px 0;color:var(--text3);font-size:.82rem;
font-weight:600;cursor:pointer;transition:var(--tr);background:none;border:none}
.ed-back:hover{color:var(--text)}
.ed-preview{width:100%;aspect-ratio:16/9;border-radius:var(--r3);margin-bottom:24px;position:relative;
overflow:hidden;cursor:crosshair;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.ed-preview::after{content:'';position:absolute;top:12px;left:20px;width:25%;height:15%;
background:rgba(255,255,255,.1);border-radius:50%;transform:rotate(-15deg);filter:blur(4px);pointer-events:none}
.ed-title{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.ed-tags{display:flex;gap:6px;margin-bottom:28px}
.ed-tag{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:20px;
background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.ed-section{margin-bottom:28px}
.ed-section-title{font-size:.72rem;font-weight:700;color:var(--text4);text-transform:uppercase;
letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Gradient Bar Editor */
.ed-bar-wrap{position:relative;margin-bottom:20px}
.ed-bar{width:100%;height:32px;border-radius:var(--r);position:relative;cursor:pointer;
box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.ed-stop{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;
border:2.5px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer;
transform:translate(-50%,-50%);transition:box-shadow .15s ease;z-index:2}
.ed-stop:hover,.ed-stop.on{box-shadow:0 0 0 3px rgba(255,255,255,.3),0 2px 6px rgba(0,0,0,.5)}
.ed-stop.on{border-width:3px}
.ed-bar-hint{font-size:.65rem;color:var(--text4);margin-top:6px;text-align:center}

/* Stop Editor */
.ed-stops-list{display:flex;flex-direction:column;gap:6px}
.ed-stop-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);
border-radius:var(--r);border:1px solid transparent;transition:var(--tr);cursor:pointer}
.ed-stop-row:hover{border-color:var(--border2)}
.ed-stop-row.on{border-color:var(--border3);background:var(--bg4)}
.ed-stop-color{width:32px;height:28px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;
padding:0;background:none;overflow:hidden;flex-shrink:0}
.ed-stop-color input{width:100%;height:100%;border:none;cursor:pointer;padding:0}
.ed-stop-hex{width:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;
padding:5px 8px;color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:.72rem;
font-weight:600;outline:none;transition:var(--tr);text-align:center}
.ed-stop-hex:focus{border-color:var(--border3)}
.ed-stop-pos{display:flex;align-items:center;gap:4px;flex:1}
.ed-stop-pos input[type="range"]{flex:1;-webkit-appearance:none;height:3px;border-radius:10px;
background:var(--bg);outline:none;cursor:pointer}
.ed-stop-pos input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
border-radius:50%;background:var(--white);cursor:pointer;box-shadow:0 0 3px rgba(0,0,0,.4)}
.ed-stop-posval{font-size:.68rem;color:var(--text3);font-weight:600;min-width:28px;text-align:right}
.ed-stop-del{width:26px;height:26px;border-radius:50%;background:none;border:1px solid transparent;
color:var(--text4);cursor:pointer;font-size:.65rem;transition:var(--tr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ed-stop-del:hover{border-color:var(--border2);color:var(--text2)}
.ed-stop-add{width:100%;height:36px;background:none;border:1px dashed var(--border);border-radius:var(--r);
color:var(--text4);font-size:.75rem;font-weight:600;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:6px}
.ed-stop-add:hover{border-color:var(--border2);color:var(--text2)}

/* Settings */
.ed-settings{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ed-setting{display:flex;flex-direction:column;gap:6px}
.ed-setting label{font-size:.7rem;font-weight:600;color:var(--text3)}
.ed-type-row{display:flex;gap:4px}
.ed-type-btn{flex:1;height:32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
color:var(--text3);font-size:.75rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.ed-type-btn:hover{border-color:var(--border2);color:var(--text2)}
.ed-type-btn.on{background:var(--white);color:#000;border-color:var(--white)}
.ed-angle-row{display:flex;align-items:center;gap:8px}
.ed-angle-row input{flex:1;-webkit-appearance:none;height:3px;border-radius:10px;
background:var(--bg);outline:none;cursor:pointer}
.ed-angle-row input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
border-radius:50%;background:var(--white);cursor:pointer;box-shadow:0 0 3px rgba(0,0,0,.4)}
.ed-angle-val{font-size:.72rem;font-weight:600;color:var(--text2);min-width:32px}

/* Code Blocks */
.ed-code{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.ed-code-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
border-bottom:1px solid var(--border)}
.ed-code-label{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.ed-code-copy{background:none;border:none;color:var(--text4);cursor:pointer;font-size:.7rem;
font-weight:600;transition:var(--tr);padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px}
.ed-code-copy:hover{color:var(--text);background:var(--bg)}
.ed-code pre{padding:10px 12px;font-family:'SF Mono','Fira Code',monospace;font-size:.72rem;
color:var(--text2);line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-all}

/* Similar */
.ed-similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.ed-sim-card{aspect-ratio:1;border-radius:var(--r);cursor:pointer;transition:var(--tr);
border:2px solid transparent;position:relative;overflow:hidden}
.ed-sim-card:hover{border-color:var(--white);transform:scale(1.05)}
.ed-sim-card::after{content:'';position:absolute;inset:0;
background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.5) 100%)}
.ed-sim-name{position:absolute;bottom:4px;left:5px;right:5px;font-size:.55rem;font-weight:600;
color:#fff;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.6);line-height:1.2}

/* ═══ TOAST ═══ */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;
display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{background:var(--white);color:#000;padding:10px 20px;border-radius:var(--r);
font-size:.8rem;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto;
animation:tIn .25s ease,tOut .25s ease 2s forwards;display:flex;align-items:center;gap:8px}
@keyframes tIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .hdr{padding:0 16px}.filters,.filter-meta,.grid-wrap{padding-left:16px;padding-right:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .editor{padding:0 16px 40px}
  .ed-settings{grid-template-columns:1fr}
  .ed-similar-grid{grid-template-columns:repeat(auto-fill,minmax(64px,1fr))}
}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .logo h1 span{display:none}
  .pill{font-size:.7rem;height:28px;padding:0 10px}
  .filter-label{min-width:52px;font-size:.65rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <div class="logo-m">E</div>
    <h1>Emsly<span>Gradients</span></h1>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" id="randomBtn"><i class="fas fa-shuffle"></i> Random</button>
    <button class="hdr-btn primary" id="createBtn"><i class="fas fa-plus"></i> Oluştur</button>
  </div>
</header>

<!-- GRID VIEW -->
<div id="gridView" class="view on">
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Kategori</span>
      <div class="filter-pills" id="catPills"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Renk</span>
      <div class="filter-pills" id="clrPills"></div>
    </div>
  </div>
  <div class="filter-meta">
    <span class="filter-count"><b id="countNum">0</b> gradient gösteriliyor</span>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
    <div class="load-more-wrap" id="loadMoreWrap">
      <button class="load-more" id="loadMoreBtn">Daha Fazla Yükle</button>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <i class="fas fa-ghost"></i>
      <p>Bu filtrelere uygun gradient bulunamadı.</p>
    </div>
  </div>
</div>

<!-- EDITOR VIEW -->
<div id="editorView" class="view">
  <div class="editor">
    <button class="ed-back" id="edBack"><i class="fas fa-arrow-left"></i> Geri</button>
    <div class="ed-preview" id="edPreview"></div>
    <h2 class="ed-title" id="edTitle"></h2>
    <div class="ed-tags" id="edTags"></div>

    <div class="ed-section">
      <div class="ed-section-title"><i class="fas fa-circle-half-stroke"></i> Renk Noktaları</div>
      <div class="ed-bar-wrap">
        <div class="ed-bar" id="edBar"></div>
        <div class="ed-bar-hint">Renkleri aşağıdan düzenle</div>
      </div>
      <div class="ed-stops-list" id="edStopsList"></div>
      <button class="ed-stop-add" id="edAddStop"><i class="fas fa-plus"></i> Renk Ekle</button>
    </div>

    <div class="ed-section">
      <div class="ed-section-title"><i class="fas fa-sliders-h"></i> Ayarlar</div>
      <div class="ed-settings">
        <div class="ed-setting">
          <label>Tip</label>
          <div class="ed-type-row" id="edTypeRow">
            <button class="ed-type-btn on" data-t="linear">Linear</button>
            <button class="ed-type-btn" data-t="radial">Radial</button>
            <button class="ed-type-btn" data-t="conic">Conic</button>
          </div>
        </div>
        <div class="ed-setting" id="edAngleWrap">
          <label>Açı: <span id="edAngleVal">135</span>°</label>
          <div class="ed-angle-row">
            <input type="range" id="edAngle" min="0" max="360" value="135">
          </div>
        </div>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title"><i class="fas fa-code"></i> Kod Çıktısı</div>
      <div class="ed-code">
        <div class="ed-code-head"><span class="ed-code-label">CSS</span>
          <button class="ed-code-copy" id="copyCss"><i class="fas fa-copy"></i> Kopyala</button></div>
        <pre id="cssOut"></pre>
      </div>
      <div class="ed-code">
        <div class="ed-code-head"><span class="ed-code-label">Roblox Lua</span>
          <button class="ed-code-copy" id="copyLua"><i class="fas fa-copy"></i> Kopyala</button></div>
        <pre id="luaOut"></pre>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title"><i class="fas fa-wand-magic-sparkles"></i> Benzer Gradientler</div>
      <div class="ed-similar-grid" id="edSimilar"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ═════════════════════════════════════════════
// EMSLY GRADIENTS — COMPLETE ENGINE
// ═════════════════════════════════════════════

// ─── HELPERS ───
const h2r=h=>{h=h.replace('#','');return{r:parseInt(h.substr(0,2),16),g:parseInt(h.substr(2,2),16),b:parseInt(h.substr(4,2),16)}};
const r2h=(r,g,b)=>'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
const hsl2rgb=(h,s,l)=>{h/=360;s/=100;l/=100;let r,g,b;if(!s)r=g=b=l;else{const q=l<.5?l*(1+s):l+s-l*s,p=2*l-q,f=(p,q,t)=>{t<0&&(t+=1);t>1&&(t-=1);return t<1/6?p+(q-p)*6*t:t<.5?q:t<2/3?p+(q-p)*(2/3-t)*6:p};r=f(p,q,h+1/3);g=f(p,q,h);b=f(p,q,h-1/3)}return{r:Math.round(r*255),g:Math.round(g*255),b:Math.round(b*255)}};
const rgb2hsl=(r,g,b)=>{r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;if(mx===mn)h=s=0;else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}};
const rHex=()=>'#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');
function toast(m){const w=document.getElementById('toastWrap'),t=document.createElement('div');
t.className='toast';t.innerHTML=`<i class="fas fa-check" style="color:#10b981"></i>${m}`;w.appendChild(t);setTimeout(()=>t.remove(),2500)}
function cpy(t,label){navigator.clipboard.writeText(t).then(()=>toast(label||'Kopyalandı'))}

function buildCSS(colors,stops,angle,type){
const pairs=colors.map((c,i)=>`${c} ${stops[i]}%`).join(', ');
if(type==='radial')return`radial-gradient(circle, ${pairs})`;
if(type==='conic')return`conic-gradient(from ${angle}deg, ${pairs})`;
return`linear-gradient(${angle}deg, ${pairs})`;
}

function avgHue(colors){
let hSum=0;colors.forEach(c=>{const rgb=h2r(c);const hsl=rgb2hsl(rgb.r,rgb.g,rgb.b);hSum+=hsl.h});
return hSum/colors.length;
}

// ─── CATEGORIES & COLORS ───
const CATS=[
{id:'all',label:'Tümü',icon:''},
{id:'pastel',label:'Pastel',icon:'🧁'},
{id:'neon',label:'Neon',icon:'⚡'},
{id:'dark',label:'Dark',icon:'🌑'},
{id:'warm',label:'Warm',icon:'🔥'},
{id:'cold',label:'Cold',icon:'❄️'},
{id:'sunset',label:'Sunset',icon:'🌅'},
{id:'nature',label:'Nature',icon:'🌿'},
{id:'cyber',label:'Cyber',icon:'💜'},
{id:'shine',label:'Shine',icon:'✨'},
{id:'multi',label:'Multi',icon:'🌈'},
];
const CLRS=[
{id:'all',label:'Tümü',hex:null},
{id:'red',label:'Kırmızı',hex:'#ef4444'},
{id:'orange',label:'Turuncu',hex:'#f97316'},
{id:'yellow',label:'Sarı',hex:'#eab308'},
{id:'green',label:'Yeşil',hex:'#22c55e'},
{id:'teal',label:'Teal',hex:'#14b8a6'},

// ─── STATE ───
let state={
  cat:'all',clr:'all',
  displayed:24,
  editId:null,
  editColors:[],editStops:[],editAngle:135,editType:'linear',editName:'',
  selectedStop:0
};

// ─── FILTER & RENDER ───
function getFiltered(){
  return DB.filter(g=>{
    if(state.cat!=='all'&&g.cat!==state.cat)return false;
    if(state.clr!=='all'&&g.clr!==state.clr)return false;
    return true;
  });
}

// Build pills
function buildPills(){
  const cp=document.getElementById('catPills');
  CATS.forEach(c=>{
    const b=document.createElement('button');b.className='pill'+(c.id==='all'?' on':'');
    b.innerHTML=c.icon?(c.icon+' '+c.label):c.label;b.dataset.id=c.id;
    b.onclick=()=>{state.cat=c.id;state.displayed=24;
    document.querySelectorAll('#catPills .pill').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderGrid()};
    cp.appendChild(b);
  });
  const clp=document.getElementById('clrPills');
  CLRS.forEach(c=>{
    const b=document.createElement('button');b.className='pill'+(c.id==='all'?' on':'');
    if(c.hex)b.innerHTML=`<span class="dot" style="background:${c.hex}"></span>${c.label}`;
    else b.textContent=c.label;
    b.dataset.id=c.id;
    b.onclick=()=>{state.clr=c.id;state.displayed=24;
    document.querySelectorAll('#clrPills .pill').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderGrid()};
    clp.appendChild(b);
  });
}

function renderGrid(){
  const filtered=getFiltered();
  const showing=filtered.slice(0,state.displayed);
  const grid=document.getElementById('grid');
  const empty=document.getElementById('emptyState');
  const lmw=document.getElementById('loadMoreWrap');
  const cnt=document.getElementById('countNum');

  cnt.textContent=filtered.length;
  grid.innerHTML='';

  if(!filtered.length){empty.style.display='block';lmw.style.display='none';return;}
  empty.style.display='none';

  showing.forEach(g=>{
    const card=document.createElement('div');card.className='card';
    const css=buildCSS(g.c,g.s,g.angle,g.type);
    const catLabel=CATS.find(c=>c.id===g.cat);
    const clrLabel=CLRS.find(c=>c.id===g.clr);
    card.innerHTML=`
      <div class="card-swatch" style="background:${css}">
        <div class="card-actions">
          <button class="card-act copy-act" title="CSS Kopyala"><i class="fas fa-copy"></i></button>
          <button class="card-act lua-act" title="Lua Kopyala"><i class="fas fa-code"></i></button>
        </div>
        <div class="card-info">
          <div class="card-name">${g.n}</div>
          <div class="card-tags">
            <span class="card-tag">${catLabel?catLabel.label:g.cat}</span>
            <span class="card-tag">${clrLabel?clrLabel.label:g.clr}</span>
          </div>
        </div>
      </div>`;
    card.querySelector('.copy-act').onclick=e=>{e.stopPropagation();cpy(`background: ${css};`,'CSS kopyalandı')};
    card.querySelector('.lua-act').onclick=e=>{e.stopPropagation();
      const kp=g.c.map((c,i)=>{const rgb=h2r(c);return`  ColorSequenceKeypoint.new(${(g.s[i]/100).toFixed(2)}, Color3.fromRGB(${rgb.r}, ${rgb.g}, ${rgb.b}))`}).join(',\n');
      cpy(`ColorSequence.new({\n${kp}\n})`,'Lua kopyalandı')};
    card.onclick=()=>openEditor(g);
    grid.appendChild(card);
  });

  if(state.displayed>=filtered.length)lmw.style.display='none';
  else{lmw.style.display='block';
    document.getElementById('loadMoreBtn').textContent=`Daha Fazla Yükle (${filtered.length-state.displayed} kalan)`}
}

document.getElementById('loadMoreBtn').onclick=()=>{state.displayed+=24;renderGrid()};

// ─── EDITOR ───
function openEditor(g){
  state.editId=g.id;
  state.editColors=[...g.c];
  state.editStops=[...g.s];
  state.editAngle=g.angle||135;
  state.editType=g.type||'linear';
  state.editName=g.n;
  state.selectedStop=0;
  document.getElementById('gridView').classList.remove('on');
  document.getElementById('editorView').classList.add('on');
  window.scrollTo(0,0);
  updateEditor();
  renderSimilar(g);
}

function closeEditor(){
  document.getElementById('editorView').classList.remove('on');
  document.getElementById('gridView').classList.add('on');
}
document.getElementById('edBack').onclick=closeEditor;

function updateEditor(){
  const css=buildCSS(state.editColors,state.editStops,state.editAngle,state.editType);
  // Preview
  document.getElementById('edPreview').style.background=css;
  // Title & tags
  document.getElementById('edTitle').textContent=state.editName;
  const og=DB.find(g=>g.id===state.editId);
  const catL=CATS.find(c=>c.id===(og?og.cat:''));
  const clrL=CLRS.find(c=>c.id===(og?og.clr:''));
  document.getElementById('edTags').innerHTML=
    `<span class="ed-tag">${catL?catL.icon+' '+catL.label:''}</span>
     <span class="ed-tag">${clrL?clrL.label:''}</span>
     <span class="ed-tag">${state.editColors.length} renk</span>`;

  // Gradient bar
  const bar=document.getElementById('edBar');
  bar.style.background=buildCSS(state.editColors,state.editStops,90,'linear');
  bar.innerHTML='';
  state.editColors.forEach((c,i)=>{
    const dot=document.createElement('div');dot.className='ed-stop'+(i===state.selectedStop?' on':'');
    dot.style.left=state.editStops[i]+'%';dot.style.background=c;
    dot.onclick=e=>{e.stopPropagation();state.selectedStop=i;updateEditor()};
    bar.appendChild(dot);
  });

  // Stops list
  const list=document.getElementById('edStopsList');list.innerHTML='';
  state.editColors.forEach((c,i)=>{
    const row=document.createElement('div');row.className='ed-stop-row'+(i===state.selectedStop?' on':'');
    row.innerHTML=`
      <div class="ed-stop-color"><input type="color" value="${c}" data-i="${i}"></div>
      <input class="ed-stop-hex" type="text" value="${c.toUpperCase()}" data-i="${i}">
      <div class="ed-stop-pos">
        <input type="range" min="0" max="100" value="${state.editStops[i]}" data-i="${i}">
        <span class="ed-stop-posval">${state.editStops[i]}%</span>
      </div>
      ${state.editColors.length>2?`<button class="ed-stop-del" data-i="${i}"><i class="fas fa-xmark"></i></button>`:''}`;

    row.querySelector('input[type="color"]').onchange=e=>{state.editColors[i]=e.target.value;updateEditor()};
    row.querySelector('.ed-stop-hex').onchange=e=>{
      let v=e.target.value;if(!v.startsWith('#'))v='#'+v;
      if(/^#[0-9a-f]{6}$/i.test(v)){state.editColors[i]=v;updateEditor()}};
    row.querySelector('input[type="range"]').oninput=e=>{state.editStops[i]=+e.target.value;updateEditor()};
    const del=row.querySelector('.ed-stop-del');
    if(del)del.onclick=()=>{state.editColors.splice(i,1);state.editStops.splice(i,1);
      if(state.selectedStop>=state.editColors.length)state.selectedStop=state.editColors.length-1;updateEditor()};
    row.onclick=()=>{state.selectedStop=i;updateEditor()};
    list.appendChild(row);
  });

  // Type buttons
  document.querySelectorAll('#edTypeRow .ed-type-btn').forEach(b=>{
    b.classList.toggle('on',b.dataset.t===state.editType);
  });
  // Angle
  document.getElementById('edAngle').value=state.editAngle;
  document.getElementById('edAngleVal').textContent=state.editAngle;
  document.getElementById('edAngleWrap').style.display=state.editType==='radial'?'none':'flex';

  // CSS output
  const cssCode=`background: ${css};`;
  document.getElementById('cssOut').textContent=cssCode;
  // Lua output
  const kp=state.editColors.map((c,i)=>{const rgb=h2r(c);
    return`  ColorSequenceKeypoint.new(${(state.editStops[i]/100).toFixed(2)}, Color3.fromRGB(${rgb.r}, ${rgb.g}, ${rgb.b}))`}).join(',\n');
  const luaCode=`local gradient = Instance.new("UIGradient")\ngradient.Color = ColorSequence.new({\n${kp}\n})\ngradient.Rotation = ${state.editAngle}`;
  document.getElementById('luaOut').textContent=luaCode;
  // Copy handlers
  document.getElementById('copyCss').onclick=()=>cpy(cssCode,'CSS kopyalandı');
  document.getElementById('copyLua').onclick=()=>cpy(luaCode,'Lua kopyalandı');
}

// Add stop
document.getElementById('edAddStop').onclick=()=>{
  if(state.editColors.length>=8){toast('Maksimum 8 renk');return}
  const mid=state.editColors.length>1?
    state.editColors[Math.floor(state.editColors.length/2)]:'#888888';
  const midPos=50;
  state.editColors.push(mid);state.editStops.push(midPos);
  state.selectedStop=state.editColors.length-1;updateEditor()};

// Type & angle
document.querySelectorAll('#edTypeRow .ed-type-btn').forEach(b=>{
  b.onclick=()=>{state.editType=b.dataset.t;updateEditor()}});
document.getElementById('edAngle').oninput=e=>{state.editAngle=+e.target.value;updateEditor()};

// ─── SIMILAR GRADIENTS ───
function renderSimilar(refGrad){
  const refHue=avgHue(refGrad.c);
  const scored=DB.filter(g=>g.id!==refGrad.id).map(g=>{
    const hDiff=Math.abs(avgHue(g.c)-refHue);
    const hueDist=Math.min(hDiff,360-hDiff);
    const catBonus=g.cat===refGrad.cat?0:30;
    const clrBonus=g.clr===refGrad.clr?0:20;
    return{g,score:hueDist+catBonus+clrBonus};
  }).sort((a,b)=>a.score-b.score).slice(0,8);

  const cont=document.getElementById('edSimilar');cont.innerHTML='';
  scored.forEach(({g})=>{
    const card=document.createElement('div');card.className='ed-sim-card';
    card.style.background=buildCSS(g.c,g.s,g.angle,g.type);
    card.innerHTML=`<span class="ed-sim-name">${g.n}</span>`;
    card.onclick=()=>{openEditor(g);window.scrollTo(0,0)};
    cont.appendChild(card);
  });
}

// ─── RANDOM ───
document.getElementById('randomBtn').onclick=()=>{
  const pool=getFiltered();
  if(!pool.length){toast('Bu filtrede gradient yok');return}
  const pick=pool[Math.floor(Math.random()*pool.length)];
  openEditor(pick);
};

// ─── CREATE NEW ───
document.getElementById('createBtn').onclick=()=>{
  const newGrad={id:-1,n:'Yeni Gradient',c:['#8B5CF6','#06B6D4'],s:[0,100],cat:'custom',clr:'purple',angle:135,type:'linear'};
  state.editId=-1;state.editName=newGrad.n;
  state.editColors=[...newGrad.c];state.editStops=[...newGrad.s];
  state.editAngle=135;state.editType='linear';state.selectedStop=0;
  document.getElementById('gridView').classList.remove('on');
  document.getElementById('editorView').classList.add('on');
  window.scrollTo(0,0);updateEditor();
  document.getElementById('edSimilar').innerHTML='<p style="color:var(--text4);font-size:.78rem">Renkleri düzenledikçe öneriler güncellenecek.</p>';
};

// ─── INIT ───
buildPills();
renderGrid();
</script>
